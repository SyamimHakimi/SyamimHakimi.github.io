# deploy.yml — Production deployment pipeline
#
# Runs ONLY on push to main and manual dispatch.
# PRs are validated by ci.yml — this workflow never runs on pull requests.

name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Deploy Firestore indexes so composite queries (gallery, services) work
      # at runtime. Requires the FIREBASE_SERVICE_ACCOUNT secret to be set in
      # the repo's GitHub Actions secrets (Settings → Secrets → Actions).
      - name: Deploy Firestore indexes
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          npx firebase-tools deploy --only firestore:indexes \
            --project portfolio-9e62d \
            --non-interactive
          rm /tmp/sa.json

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
