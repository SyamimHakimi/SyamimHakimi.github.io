# ci.yml — Validation pipeline
#
# Runs on every pull request and branch push (excluding main).
# Never deploys. Purpose: catch lint errors, type errors, test failures,
# and broken builds before they reach main.
#
# deploy.yml handles the actual GitHub Pages deployment on push to main.

name: Validate

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Test
        run: npm test

      - name: Build (includes type-check)
        run: npm run build
