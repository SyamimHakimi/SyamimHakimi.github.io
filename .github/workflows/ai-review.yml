# ai-review.yml — CI-gated auto-merge for phase branches
#
# Triggers when a PR is opened or updated on a phase branch targeting main.
# AI peer review is performed locally by the owning agent BEFORE the PR is opened.
# This workflow only waits for CI to pass, then squash-merges, updates HANDOFF.md,
# and deletes the branch.
#
# No API keys required.

name: Auto Merge Phase PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Wait for CI and Auto-merge
    runs-on: ubuntu-latest

    # Only run for phase branches
    if: contains(github.head_ref, '/phase-a')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip bot-authored commits
        id: guard
        run: |
          MSG=$(git log -1 --format='%s' ${{ github.event.pull_request.head.sha }})
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — commit marked [skip ci]"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Always fetch the merge script from main so every branch uses the latest version.
      - name: Fetch merge script from main
        if: steps.guard.outputs.skip != 'true'
        run: git show origin/main:scripts/agents/ai-review.mjs > scripts/agents/ai-review.mjs

      - name: Run auto-merge
        if: steps.guard.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
        run: node scripts/agents/ai-review.mjs
